name: Build Desktop Apps

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Build Windows EXE
        shell: pwsh
        run: |
          python -m PyInstaller --noconfirm --clean --distpath dist --workpath build CNInfoReportCollector.spec

      - name: Create Windows ZIP
        shell: pwsh
        run: |
          Compress-Archive -LiteralPath dist/CNInfoReportCollector.exe -DestinationPath dist/CNInfoReportCollector-windows.zip -Force

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CNInfoReportCollector-windows
          path: |
            dist/CNInfoReportCollector.exe
            dist/CNInfoReportCollector-windows.zip
          if-no-files-found: error

  build-macos-arm64:
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Build macOS arm64 app
        run: |
          python -m PyInstaller --noconfirm --clean --windowed --distpath dist --workpath build --name CNInfoReportCollector --target-arch arm64 --icon assets/app_icon.icns --osx-bundle-identifier com.kingprotea.cninforeportcollector --collect-all quickjs app.py

      - name: Create macOS arm64 ZIP
        run: |
          ditto -c -k --sequesterRsrc --keepParent dist/CNInfoReportCollector.app dist/CNInfoReportCollector-macos-arm64.zip

      - name: Upload macOS arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: CNInfoReportCollector-macos-arm64
          path: dist/CNInfoReportCollector-macos-arm64.zip
          if-no-files-found: error

  build-macos-x64:
    runs-on: macos-15-intel

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Build macOS x64 app
        run: |
          python -m PyInstaller --noconfirm --clean --windowed --distpath dist --workpath build --name CNInfoReportCollector --target-arch x86_64 --icon assets/app_icon.icns --osx-bundle-identifier com.kingprotea.cninforeportcollector --collect-all quickjs app.py

      - name: Create macOS x64 ZIP
        run: |
          ditto -c -k --sequesterRsrc --keepParent dist/CNInfoReportCollector.app dist/CNInfoReportCollector-macos-x64.zip

      - name: Upload macOS x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: CNInfoReportCollector-macos-x64
          path: dist/CNInfoReportCollector-macos-x64.zip
          if-no-files-found: error
