name: Publish GitHub Release

on:
  push:
    tags:
      - "v*"

jobs:
  release-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Build desktop EXE
        shell: pwsh
        run: |
          python -m PyInstaller --noconfirm --clean --distpath dist --workpath build CNInfoReportCollector.spec

      - name: Create release ZIP
        shell: pwsh
        run: |
          $zipName = "CNInfoReportCollector-${{ github.ref_name }}-windows.zip"
          Compress-Archive -LiteralPath dist/CNInfoReportCollector.exe -DestinationPath (Join-Path dist $zipName) -Force

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/CNInfoReportCollector.exe
            dist/CNInfoReportCollector-${{ github.ref_name }}-windows.zip
