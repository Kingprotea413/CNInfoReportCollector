name: Publish GitHub Release

on:
  push:
    tags:
      - "v*"

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release_version.outputs.version }}

    steps:
      - name: Resolve release version
        id: release_version
        run: |
          echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

  build-windows:
    needs: prepare-release
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Build Windows EXE
        shell: pwsh
        run: |
          python -m PyInstaller --noconfirm --clean --distpath dist --workpath build CNInfoReportCollector.spec

      - name: Create Windows ZIP
        shell: pwsh
        run: |
          $zipName = "CNInfoReportCollector-${{ needs.prepare-release.outputs.version }}-windows.zip"
          Compress-Archive -LiteralPath dist/CNInfoReportCollector.exe -DestinationPath (Join-Path dist $zipName) -Force

      - name: Upload Windows release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: |
            dist/CNInfoReportCollector.exe
            dist/CNInfoReportCollector-${{ needs.prepare-release.outputs.version }}-windows.zip
          if-no-files-found: error

  build-macos:
    needs: prepare-release
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Build macOS app
        run: |
          python -m PyInstaller --noconfirm --clean --windowed --distpath dist --workpath build --name CNInfoReportCollector app.py

      - name: Create macOS ZIP
        run: |
          ditto -c -k --sequesterRsrc --keepParent dist/CNInfoReportCollector.app dist/CNInfoReportCollector-${{ needs.prepare-release.outputs.version }}-macos.zip

      - name: Upload macOS release asset
        uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: dist/CNInfoReportCollector-${{ needs.prepare-release.outputs.version }}-macos.zip
          if-no-files-found: error

  publish-release:
    needs:
      - prepare-release
      - build-windows
      - build-macos
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Windows assets
        uses: actions/download-artifact@v4
        with:
          name: release-windows
          path: release-assets/windows

      - name: Download macOS asset
        uses: actions/download-artifact@v4
        with:
          name: release-macos
          path: release-assets/macos

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/windows/CNInfoReportCollector.exe
            release-assets/windows/CNInfoReportCollector-${{ needs.prepare-release.outputs.version }}-windows.zip
            release-assets/macos/CNInfoReportCollector-${{ needs.prepare-release.outputs.version }}-macos.zip
