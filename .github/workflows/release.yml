name: Publish GitHub Release

on:
  push:
    tags:
      - "v*"
    branches:
      - "release/*"

jobs:
  release-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Build desktop EXE
        shell: pwsh
        run: |
          python -m PyInstaller --noconfirm --clean --distpath dist --workpath build CNInfoReportCollector.spec

      - name: Resolve release version
        id: release_version
        shell: pwsh
        run: |
          $refType = "${{ github.ref_type }}"
          $refName = "${{ github.ref_name }}"
          if ($refType -eq "tag") {
            $version = $refName
          } elseif ($refName.StartsWith("release/")) {
            $version = $refName.Substring(8)
          } else {
            throw "Unsupported release ref: $refName"
          }
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Create release ZIP
        shell: pwsh
        run: |
          $zipName = "CNInfoReportCollector-${{ steps.release_version.outputs.version }}-windows.zip"
          Compress-Archive -LiteralPath dist/CNInfoReportCollector.exe -DestinationPath (Join-Path dist $zipName) -Force

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_version.outputs.version }}
          name: ${{ steps.release_version.outputs.version }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            dist/CNInfoReportCollector.exe
            dist/CNInfoReportCollector-${{ steps.release_version.outputs.version }}-windows.zip
