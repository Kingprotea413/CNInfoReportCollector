name: Publish GitHub Release

on:
  push:
    tags:
      - "v*"

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release_version.outputs.version }}

    steps:
      - name: Resolve release version
        id: release_version
        run: |
          echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

  build-windows:
    needs: prepare-release
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Build Windows EXE
        shell: pwsh
        run: |
          python -m PyInstaller --noconfirm --clean --distpath dist --workpath build CNInfoReportCollector.spec

      - name: Create Windows ZIP
        shell: pwsh
        run: |
          $zipName = "CNInfoReportCollector-${{ needs.prepare-release.outputs.version }}-windows.zip"
          Compress-Archive -LiteralPath dist/CNInfoReportCollector.exe -DestinationPath (Join-Path dist $zipName) -Force

      - name: Upload Windows release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: |
            dist/CNInfoReportCollector.exe
            dist/CNInfoReportCollector-${{ needs.prepare-release.outputs.version }}-windows.zip
          if-no-files-found: error

  build-macos-arm64:
    needs: prepare-release
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Build macOS arm64 app
        run: |
          python -m PyInstaller --noconfirm --clean --windowed --distpath dist --workpath build --name CNInfoReportCollector --target-arch arm64 --icon assets/app_icon.icns --osx-bundle-identifier com.kingprotea.cninforeportcollector --collect-all quickjs app.py

      - name: Create macOS arm64 ZIP
        run: |
          ditto -c -k --sequesterRsrc --keepParent dist/CNInfoReportCollector.app dist/CNInfoReportCollector-${{ needs.prepare-release.outputs.version }}-macos-arm64.zip

      - name: Upload macOS arm64 release asset
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-arm64
          path: dist/CNInfoReportCollector-${{ needs.prepare-release.outputs.version }}-macos-arm64.zip
          if-no-files-found: error

  build-macos-x64:
    needs: prepare-release
    runs-on: macos-15-intel

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Build macOS x64 app
        run: |
          python -m PyInstaller --noconfirm --clean --windowed --distpath dist --workpath build --name CNInfoReportCollector --target-arch x86_64 --icon assets/app_icon.icns --osx-bundle-identifier com.kingprotea.cninforeportcollector --collect-all quickjs app.py

      - name: Create macOS x64 ZIP
        run: |
          ditto -c -k --sequesterRsrc --keepParent dist/CNInfoReportCollector.app dist/CNInfoReportCollector-${{ needs.prepare-release.outputs.version }}-macos-x64.zip

      - name: Upload macOS x64 release asset
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-x64
          path: dist/CNInfoReportCollector-${{ needs.prepare-release.outputs.version }}-macos-x64.zip
          if-no-files-found: error

  publish-release:
    needs:
      - prepare-release
      - build-windows
      - build-macos-arm64
      - build-macos-x64
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Windows assets
        uses: actions/download-artifact@v4
        with:
          name: release-windows
          path: release-assets/windows

      - name: Download macOS arm64 asset
        uses: actions/download-artifact@v4
        with:
          name: release-macos-arm64
          path: release-assets/macos-arm64

      - name: Download macOS x64 asset
        uses: actions/download-artifact@v4
        with:
          name: release-macos-x64
          path: release-assets/macos-x64

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/windows/CNInfoReportCollector.exe
            release-assets/windows/CNInfoReportCollector-${{ needs.prepare-release.outputs.version }}-windows.zip
            release-assets/macos-arm64/CNInfoReportCollector-${{ needs.prepare-release.outputs.version }}-macos-arm64.zip
            release-assets/macos-x64/CNInfoReportCollector-${{ needs.prepare-release.outputs.version }}-macos-x64.zip
